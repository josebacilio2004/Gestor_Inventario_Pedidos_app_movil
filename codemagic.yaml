workflows:
  android-ios-workflow:
    name: Android & iOS Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      groups:
        - ad-hoc-credentials # Agrupar aquí certificados si se desea firma automática
      vars:
        PACKAGE_NAME: "com.aly.gestor.inventario"
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: 'main'
          include: true
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android APK
        script: |
          flutter build apk --release
      - name: Build iOS IPA
        script: |
          # Nota: Requiere certificados configurados en Codemagic para builds 'release' reales
          # Para pruebas internas se puede usar --no-codesign si solo se quiere verificar la compilación
          flutter build ipa --release --no-codesign
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - admin@example.com # Cambiar por el correo del usuario
        notify:
          success: true
          failure: true
